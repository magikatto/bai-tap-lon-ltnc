name: Java CI & Code Quality

# Kích hoạt khi có người đẩy code hoặc tạo Pull Request vào nhánh main
on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["main"]

permissions:
  contents: write
  pull-requests: read

jobs:
  build-and-check:
    runs-on: ubuntu-latest
    steps:
      - name: Tải mã nguồn về máy chủ GitHub
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Bắt buộc để kiểm tra lịch sử commit

      - name: Kiểm tra quy tắc Conventional Commits
        uses: wagoid/commitlint-github-action@v5
        # Nếu commit không có chữ feat, fix, chore... nó sẽ đánh trượt ngay

      - name: Cài đặt Java 21 cho máy chủ
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: "temurin"
          cache: maven

      - name: Tự động format code (Spotless Apply)
        working-directory: auction-server
        run: mvn spotless:apply
        # Tự động sửa format code cho đúng Google Java Style

      - name: Commit code đã format (nếu có thay đổi)
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "style: auto-format code with Google Java Style"
          # Nếu spotless:apply sửa file nào, tự commit lại lên GitHub

      - name: Kiểm tra chạy thử dự án (Build)
        working-directory: auction-server
        run: mvn clean package -DskipTests
        # Kiểm tra xem code có bị lỗi cú pháp gạch đỏ không

      - name: Chạy Unit Test (JUnit)
        working-directory: auction-server
        run: mvn test
        # Tự động chạy toàn bộ test JUnit mỗi lần push
